server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 100MB
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://172.*:*,http://10.*:*}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
            exposedHeaders:
              - Authorization
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/chats/**
        - id: message-service
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/messages/**,/api/media/**
        - id: websocket-service
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/ws/**
        - id: presence-service
          uri: ${PRESENCE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/presence/**
