server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:3000
              - http://127.0.0.1:3000
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
            exposedHeaders:
              - Authorization
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/chats/**
        - id: message-service
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/messages/**,/api/media/**
        - id: presence-service
          uri: ${PRESENCE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/presence/**
